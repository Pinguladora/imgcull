tag_prefix = "v"
from_latest_tag = false
ignore_merge_commits = false
ignore_fixup_commits = true
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = [
  "main",
]
skip_ci = "[skip ci]"
skip_untracked = true
pre_bump_hooks = [
    "mise run build"
]
post_bump_hooks = [
    "git push origin {{version_tag}}"
]
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks]

[commit_types]
chore = { changelog_title = "", omit_from_changelog = true }
ci = { changelog_title = "", omit_from_changelog = true }
docs = { changelog_title = "", omit_from_changelog = true }


[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "imgcull"
owner = "Pinguladora"
authors = [
    { username = "Pinguladora", signature = "Pinguladora"}
]

[bump_profiles]
