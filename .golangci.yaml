# For reference
# https://wormholerelays.com/posts/top-eight-underdog-linters-for-go/
# https://gist.github.com/mrwormhole/a2f775c9a3b8932135ab4a80ebdedfd8 (Migrated)
version: "2"
run:
  tests: true
  go: "1.26"
  concurrency: 4
  timeout: 10m

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - cyclop
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errname
    - exptostd
    - fatcontext
    - forcetypeassert
    - funlen
    - gochecknoinits
    - gocritic
    - gocognit
    - goconst
    - godoclint
    - godot
    - godox
    - gosec
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - lll
    - mnd
    - modernize
    - musttag
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - recvcheck
    - revive
    - rowserrcheck
    - spancheck
    - staticcheck
    - tagalign
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - whitespace
    - wrapcheck
    - zerologlint
  settings:
    govet:
      enable:
        - fieldalignment
    goconst:
      min-len: 3
      min-occurrences: 3
    godox:
      keywords:
        - TODO
        - BUG
        - FIXME
        - OPTIMIZE
        - HACK
    interfacebloat:
      max: 5
    nolintlint:
      require-explanation: false
      require-specific: true
      allow-unused: false
    perfsprint:
      # Optimizes even if it requires an int or uint type cast.
      int-conversion: true
      # Optimizes into `err.Error()` even if it is only equivalent for non-nil errors.
      err-error: true
      # Optimizes `fmt.Errorf`.
      errorf: true
      # Optimizes `fmt.Sprintf` with only one argument.
      sprintf1: true
      # Optimizes into strings concatenation.
      strconcat: true
    revive:
      max-open-files: 2048
      confidence: 0.8
      severity: warning
      enable-all-rules: false
      rules:
        - name: context-as-argument
          severity: warning
          disabled: false
        - name: defer
          severity: warning
          disabled: false
        - name: unexported-return
          severity: warning
          disabled: false
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          severity: warning
          disabled: false
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
    usetesting:
      os-mkdir-temp: true
      os-setenv: true
      os-temp-dir: true
      os-create-temp: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - goconst
        path: (.+)_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/pinguladora/imgcull)
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  # all issues
  new: false
  # make `golangci-lint` fail fast in CI when issues found
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
