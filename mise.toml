[settings]
disable_backends = ["asdf", "vfox", "ubi"]

[tools]
cocogitto = "6.5.0"
go = "1.26.2"
golangci-lint = "2.11.4"
goreleaser = "2.15.2"
pinact = "3.9.0"
prek = "0.3.8"
syft = "1.42.1"
upx = "5.1.1"

[tasks."lint:golangci-lint"]
description = "Lint using golangci with autofix"
run = "golangci-lint run ./... --fix"
sources = ["**/*.go"]

[tasks.lint]
description = "Runs all linting"
depends = ["lint:*"]

[tasks.build]
description = "Local build (without goreleaser)"
run = "go build ./cmd/imgcull"
alias = "b"

[tasks.snapshot]
description = "Local snapshot build (skips signing, SBOM and ko)"
run = "goreleaser release --snapshot --clean --skip=sign,sbom,ko"
alias = "snap"

[tasks."snapshot:container"]
description = "Local snapshot build (skips signing and SBOM)"
run = "goreleaser release --snapshot --clean --skip=sign,sbom"
alias = "snapc"

[tasks.pgo-collect]
description = "Build with pprof and collect a 30s CPU profile"
run = """
go build -tags=pprof -o imgcull-pprof ./cmd/imgcull
echo "Run ./imgcull-pprof with a representative workload, then:"
echo "  curl -sS http://localhost:6060/debug/pprof/profile?seconds=30 -o cmd/imgcull/default.pgo"
"""

[tasks.test]
description = "Run all tests"
run = "go test ./..."
alias = "t"
sources = ["**/*.go", "go.mod", "go.sum"]

[tasks."test:verbose"]
description = "Run all tests with verbose output"
run = "go test ./... -v"
alias = "tv"
sources = ["**/*.go", "go.mod", "go.sum"]

[tasks."test:coverage"]
description = "Run tests with coverage report"
run = "go test ./... -coverprofile=coverage.out && go tool cover -func=coverage.out"
alias = "tc"
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["coverage.out"]

[tasks.bump]
description = "Calculate next version from conventional commits and tag"
run = "cog bump --auto"
