version: 2

project_name: imgcull

before:
  hooks:
    - go mod download # Ensures dependencies are fetched before build starts

builds:
  - id: production
    main: ./cmd/imgcull
    binary: imgcull-{{ .Os}}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath # Removes local system paths
      - -buildvcs=false # Removes dependency on the local .git state
    ldflags:
      - -s -w # Strips debug info
      - -buildid= # Zeroes out the build ID for hash parity
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}} # Use CommitDate, NOT current time
      - -extldflags="-static"
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # https://en.wikipedia.org/wiki/X86-64#Microarchitecture_levels
    goamd64:
      - v4
    goarm64:
      - v9.0
    ignore:
      - goos: windows
        goarch: arm64
    # only runs on actual tags/releases
    skip: "{{ .IsSnapshot }}"

  - id: dev
    main: ./cmd/imgcull
    binary: imgcull-{{ .Os}}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=dev
    gcflags:
      - all=-N -l # Disable optimizations and inlining for better debugging
    ldflags:
      - -X main.version={{.Version}}-dev
      - -extldflags="-static"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # https://en.wikipedia.org/wiki/X86-64#Microarchitecture_levels
    goamd64:
      - v4
    goarm64:
      - v9.0
    ignore:
      - goos: windows
        goarch: arm64
    # only runs on snapshot builds
    skip: "{{ not .IsSnapshot }}"

report_sizes: true

upx:
  - ids: ["production"] # Only compress production builds
    enabled: true
    compress: best
    lzma: true
    goos: [linux] # Skip 'darwin' (macOS) to avoid signing issues and Windows to avoid antivirus false positives
    goarch: [arm64] # Only 'arm64' for IoT devices, which benefit most from compression

gomod:
  proxy: true # Ensures dependencies are fetched from the proxy (Verifiable builds https://goreleaser.com/customization/verifiable_builds/)
  mod: readonly # Prevents accidental changes to go.mod/go.sum during build (before Go 1.26 behavior)

kos:
  - id: imgcull-image
    build: production # Links to the reproducible build above
    repositories:
      - ghcr.io/pinguladora/imgcull
    user: "65532:65532"
    tags:
      - latest
      - "{{.Tag}}"

    platforms:
      - linux/amd64
      - linux/arm64

    sbom: spdx

    # Set internal file times to Unix Epoch for bit-for-bit parity
    creation_time: "{{.CommitTimestamp}}"
    ko_data_creation_time: "{{.CommitTimestamp}}"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  format: "{{ .Message }}"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?(\([[:word:]]+\))??!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: "Dependency Updates"
      regexp: '^.*?(feat|fix|chore)\(deps?.+\)!?:.+$'
      order: 300
    - title: "Miscellaneous Work"
      order: 999
  filters:
    exclude:
      - '^test(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - '^style(\(.+\))?:'

release:
  prerelease: auto
  include_meta: true
  footer: |
    **Full Changelog**: https://github.com/Pinguladora/imgcull/compare/{{ .PreviousTag }}...{{ .Tag }}

sboms:
  - id: cyclonedx
    artifacts: archive
    cmd: syft
    args:
      - "scan"
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "${artifact}.cdx.json"
  - id: spdx
    artifacts: archive
    cmd: syft
    args:
      - "scan"
      - "$artifact"
      - "--output"
      - "spdx-json=$document"
    documents:
      - "${artifact}.spdx.json"
signs:
  - id: keyless-blob-sign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--use-signing-config=false" # Avoids reliance on Rekor TSA to provide customization
      - "--timestamp-server-url=http://freetsa.org/tsr"
      - "--yes"
    output: true

docker_signs:
  - id: keyless-image-sign
    artifacts: all
    cmd: cosign
    args:
      - "sign"
      - "${artifact}"
      - "--use-signing-config=false" # Avoids reliance on Rekor TSA to provide customization
      - "--timestamp-server-url=http://freetsa.org/tsr"
    output: true
