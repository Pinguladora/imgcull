version: 2

project_name: imgcull

before:
  hooks:
    - go mod download # Ensures dependencies are fetched before build starts

builds:
  - id: production
    main: ./cmd/imgcull
    binary: >-
      imgcull-{{ .Os }}-
      {{- .Arch }}
      {{- with .Amd64 }}-{{ . }}{{ end }}
      {{- with .Arm64 }}-{{ . }}{{ end }}
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath # Removes local system paths
      - -buildvcs=false # Removes dependency on the local .git state
    ldflags:
      - -s -w # Strips debug info
      - -buildid= # Zeroes out the build ID for hash parity
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}} # Use CommitDate, NOT current time
      - -extldflags="-static"
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      # AMD64 tiers
      - linux_amd64_v3 # Baseline: AVX2, BMI2 (Haswell+ 2013)
      - linux_amd64_v4 # Performance: AVX-512 (Ice Lake+)
      - windows_amd64_v3
      - windows_amd64_v4
      - darwin_amd64_v3
      - darwin_amd64_v4
      # ARM64 tiers
      - linux_arm64_v8.0 # Baseline: RPi 3/4/5, Jetson Nano, most IoT SBCs
      - linux_arm64_v9.0 # Performance: Cortex-X2+, Neoverse V2+
      - darwin_arm64_v8.0
      - darwin_arm64_v9.0
    # only runs on actual tags/releases
    skip: "{{ .IsSnapshot }}"

  - id: production-fips
    main: ./cmd/imgcull
    binary: >-
      imgcull-fips-{{ .Os }}-
      {{- .Arch }}
      {{- with .Amd64 }}-{{ . }}{{ end }}
      {{- with .Arm64 }}-{{ . }}{{ end }}
    env:
      - CGO_ENABLED=0
      - GOFIPS140=v1.26.0
    flags:
      - -trimpath # Removes local system paths
      - -buildvcs=false # Removes dependency on the local .git state
    ldflags:
      - -s -w # Strips debug info
      - -buildid= # Zeroes out the build ID for hash parity
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}} # Use CommitDate, NOT current time
      - -extldflags="-static"
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      # AMD64 tiers
      - linux_amd64_v3 # Baseline: AVX2, BMI2 (Haswell+ 2013)
      - linux_amd64_v4 # Performance: AVX-512 (Ice Lake+)
      - windows_amd64_v3
      - windows_amd64_v4
      - darwin_amd64_v3
      - darwin_amd64_v4
      # ARM64 tiers
      - linux_arm64_v8.0 # Baseline: RPi 3/4/5, Jetson Nano, most IoT SBCs
      - linux_arm64_v9.0 # Performance: Cortex-X2+, Neoverse V2+
      - darwin_arm64_v8.0
      - darwin_arm64_v9.0
    # only runs on actual tags/releases
    skip: "{{ .IsSnapshot }}"

  - id: dev
    main: ./cmd/imgcull
    binary: >-
      imgcull-{{ .Os }}-
      {{- .Arch }}
      {{- with .Amd64 }}-{{ . }}{{ end }}
      {{- with .Arm64 }}-{{ . }}{{ end }}
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=dev
    gcflags:
      - all=-N -l # Disable optimizations and inlining for better debugging
    ldflags:
      - -X main.version={{.Version}}-dev
      - -extldflags="-static"
    targets:
      # AMD64 tiers
      - linux_amd64_v3 # Baseline: AVX2, BMI2 (Haswell+ 2013)
      - linux_amd64_v4 # Performance: AVX-512 (Ice Lake+)
      - windows_amd64_v3
      - windows_amd64_v4
      - darwin_amd64_v3
      - darwin_amd64_v4
      # ARM64 tiers
      - linux_arm64_v8.0 # Baseline: RPi 3/4/5, Jetson Nano, most IoT SBCs
      - linux_arm64_v9.0 # Performance: Cortex-X2+, Neoverse V2+
      - darwin_arm64_v8.0
      - darwin_arm64_v9.0
    # only runs on snapshot builds
    skip: "{{ not .IsSnapshot }}"

  - id: dev-fips
    main: ./cmd/imgcull
    binary: >-
      imgcull-fips-{{ .Os }}-
      {{- .Arch }}
      {{- with .Amd64 }}-{{ . }}{{ end }}
      {{- with .Arm64 }}-{{ . }}{{ end }}
    env:
      - CGO_ENABLED=0
      - GOFIPS140=v1.26.0
    flags:
      - -tags=dev
    gcflags:
      - all=-N -l # Disable optimizations and inlining for better debugging
    ldflags:
      - -X main.version={{.Version}}-dev
      - -extldflags="-static"
    targets:
      # AMD64 tiers
      - linux_amd64_v3 # Baseline: AVX2, BMI2 (Haswell+ 2013)
      - linux_amd64_v4 # Performance: AVX-512 (Ice Lake+)
      - windows_amd64_v3
      - windows_amd64_v4
      - darwin_amd64_v3
      - darwin_amd64_v4
      # ARM64 tiers
      - linux_arm64_v8.0 # Baseline: RPi 3/4/5, Jetson Nano, most IoT SBCs
      - linux_arm64_v9.0 # Performance: Cortex-X2+, Neoverse V2+
      - darwin_arm64_v8.0
      - darwin_arm64_v9.0
    # only runs on snapshot builds
    skip: "{{ not .IsSnapshot }}"

report_sizes: true

upx:
  - ids: ["production", "production-fips"] # Only compress production builds
    enabled: false # Off by default as it breaks SLSA provenance
    compress: best
    lzma: true
    goos: [linux] # Skip 'darwin' (macOS) to avoid signing issues and Windows to avoid antivirus false positives
    goarch: [arm64] # Only 'arm64' for IoT devices, which benefit most from compression

gomod:
  proxy: true # Ensures dependencies are fetched from the proxy (Verifiable builds https://goreleaser.com/customization/verifiable_builds/)
  mod: readonly # Prevents accidental changes to go.mod/go.sum during build (before Go 1.26 behavior)

kos:
  # Production performance tier for container/cluster workloads
  - id: imgcull-image
    build: production
    repositories:
      - ghcr.io/pinguladora/imgcull
    user: "65532:65532"
    tags:
      - latest
      - "{{.Tag}}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: spdx
    creation_time: "{{.CommitTimestamp}}"
    ko_data_creation_time: "{{.CommitTimestamp}}"

  # FIPS compliance for container/cluster workloads
  - id: imgcull-image-fips
    build: production-fips
    repositories:
      - ghcr.io/pinguladora/imgcull
    user: "65532:65532"
    tags:
      - "{{.Tag}}-fips"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: spdx
    creation_time: "{{.CommitTimestamp}}"
    ko_data_creation_time: "{{.CommitTimestamp}}"

archives:
  - id: standard
    ids: [production, dev]
    allow_different_binary_count: true
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Amd64 }}_{{ . }}{{ end }}
      {{- with .Arm64 }}_{{ . }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: fips
    ids: [production-fips, dev-fips]
    allow_different_binary_count: true
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-fips_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Amd64 }}_{{ . }}{{ end }}
      {{- with .Arm64 }}_{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  format: "{{ .Message }}"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?(\([[:word:]]+\))??!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: "Dependency Updates"
      regexp: '^.*?(feat|fix|chore)\(deps?.+\)!?:.+$'
      order: 300
    - title: "Miscellaneous Work"
      order: 999
  filters:
    exclude:
      - '^test(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - '^style(\(.+\))?:'

release:
  prerelease: auto
  include_meta: true
  footer: |
    **Full Changelog**: https://github.com/Pinguladora/imgcull/compare/{{ .PreviousTag }}...{{ .Tag }}

sboms:
  - id: cyclonedx
    artifacts: archive
    cmd: syft
    args:
      - "scan"
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "${artifact}.cdx.json"
  - id: spdx
    artifacts: archive
    cmd: syft
    args:
      - "scan"
      - "$artifact"
      - "--output"
      - "spdx-json=$document"
    documents:
      - "${artifact}.spdx.json"
signs:
  - id: keyless-blob-sign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--use-signing-config=false" # Avoids reliance on Rekor TSA to provide customization
      - "--timestamp-server-url=http://freetsa.org/tsr"
      - "--yes"
    output: true
docker_signs:
  - id: keyless-image-sign
    artifacts: all
    cmd: cosign
    args:
      - "sign"
      - "${artifact}"
      - "--use-signing-config=false" # Avoids reliance on Rekor TSA to provide customization
      - "--timestamp-server-url=http://freetsa.org/tsr"
    output: true
