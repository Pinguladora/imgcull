name: Scheduled Release

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month at 09:00 UTC

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-and-bump:
    name: Check for unreleased commits and bump
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # octo-sts OIDC exchange
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true"
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: "blob:none"
          persist-credentials: false
      - name: Obtain release token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguladora/imgcull
          identity: scheduled-release
      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Pinguladora/imgcull.git"
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Check for unreleased commits and bump
        run: mise run release:check && mise run bump
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
